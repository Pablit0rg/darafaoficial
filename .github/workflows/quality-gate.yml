name: Quality Gate (TypeScript & ESLint)
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  inspection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4
      - name: Configuração do Ambiente Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
      - name: Instalação de Dependências
        run: npm ci
      - name: Verificação de Tipagem (TypeScript)
        run: npx tsc --noEmit
      - name: Verificação de Padrões de Código (ESLint)
        run: npm run lint
